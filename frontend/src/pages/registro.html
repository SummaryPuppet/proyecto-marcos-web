<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ticket Plus - Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/registro.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid p-0">
        <a class="navbar-brand px-3" href="/">Ticket +</a>
        <button
          class="navbar-toggler mx-3"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./informacion.html">Nosotros</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./compras.html">Compras</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./ver-boletos.html">Ver boletos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./login.html">Iniciar Sesion</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./registro.html">Registrarse</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row vh-100">
        <div
          class="col-md-6 d-flex flex-column justify-content-center align-items-center"
        >
          <div class="mb-4">
            <span class="lang active" onclick="setLanguage('es')">Español</span>
            |
            <span class="lang" onclick="setLanguage('en')">English</span>
          </div>

          <form id="registerForm" class="w-75">
            <div class="mb-3">
              <label id="label-name">Nombre</label>
              <input
                type="text"
                id="input-name"
                class="form-control"
                placeholder="Tu nombre"
              />
            </div>

            <div class="mb-3">
              <label id="label-email">Email</label>
              <input
                type="email"
                id="input-email"
                class="form-control"
                placeholder="Ingresa tu email"
              />
            </div>

            <div class="mb-3">
              <label id="label-password">Contraseña</label>
              <div class="input-group">
                <input
                  type="password"
                  id="input-password"
                  class="form-control"
                />
                <span
                  class="input-group-text"
                  onclick="togglePassword('input-password', 'icon1')"
                >
                  <i class="fa-regular fa-eye-slash" id="icon1"></i>
                </span>
              </div>
            </div>

            <div class="mb-3">
              <label id="label-confirm">Confirmar contraseña</label>
              <div class="input-group">
                <input
                  type="password"
                  id="input-confirm"
                  class="form-control"
                />
                <span
                  class="input-group-text"
                  onclick="togglePassword('input-confirm', 'icon2')"
                >
                  <i class="fa-regular fa-eye-slash" id="icon2"></i>
                </span>
              </div>
            </div>

            <div id="error-box" class="alert alert-danger d-none"></div>

            <button
              type="submit"
              id="btn-register"
              class="btn btn-outline-danger w-100 mb-3"
            >
              Registrarse
            </button>

            <hr />

            <div class="text-center">
              <a href="login.html" id="login-link"
                >¿Ya tienes cuenta? Inicia sesión</a
              >
            </div>
          </form>
        </div>

        <div
          class="col-md-6 d-none d-md-block"
          style="
            background: url(&quot;./img/logo-login.jpeg&quot;) center/cover;
          "
        ></div>
      </div>
    </div>

    <div class="modal fade" id="registerSuccessModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4">
          <h4>Cuenta creada</h4>
          <p>Registro exitoso</p>
          <button class="btn btn-success" onclick="goToLogin()">
            Ir al login
          </button>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white text-center p-3">
      Vive la música. Siente la experiencia.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/registro.js"></script>
  </body>
</html>
